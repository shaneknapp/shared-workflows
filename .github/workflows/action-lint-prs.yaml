name: "Lint workflow files on pull requests"
on:
  - pull_request  # yamllint disable-line rule:truthy

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint YAML files
        run: yamllint --no-warnings .

      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d

      # - name: Install gh-actionlint
      #   run: |
      #     gh extension install https://github.com/cschleiden/gh-actionlint
      #     gh actionlint -ignore '".+" line too long'
