name: YAML Lint

on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install yamllint
        run: pip install yamllint==1.38.0

      - name: Lint YAML files
        run: yamllint --no-warnings .
